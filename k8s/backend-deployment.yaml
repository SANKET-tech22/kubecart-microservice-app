apiVersion: apps/v1 
kind: Deployment
metadata: 
  name: kubecart-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubecart-backend
  template:
    metadata:
      labels:
        app: kubecart-backend
    spec:
      containers:
        - name: backend
          image: sanketf5/kubecart-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              value: db 

            - name: DB_NAME
              valueFrom: 
                secretKeyRef:
                  name: db-secret
                  key: DB_NAME

            - name: DB_USER 
              valueFrom:  
                secretKeyRef:
                  name: db-secret 
                  key: DB_USER 

            - name: DB_PASSWORD
              valueFrom: 
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
            